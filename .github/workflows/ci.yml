name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Allow pushing container images to GitHub Container Registry (deliver job)
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build, test, coverage and format check
        run: ./mvnw verify -B -Pquality

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: jacoco-report
          path: target/jacoco-report/
          retention-days: 7

  # CD (Delivery): build and push a deployable image on successful build of main/master
  deliver:
    name: build-and-push-image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Package (skip tests; CI already passed)
        run: ./mvnw package -B -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

